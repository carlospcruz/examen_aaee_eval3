name: CI-CD Examen CPC
on:
  push:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to GHCR
        run: echo "${{ secrets.G_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Image
        run: |
          docker build -t ghcr.io/carlospcruz/examen_aaee_eval3:latest .
          docker push ghcr.io/carlospcruz/examen_aaee_eval3:latest
